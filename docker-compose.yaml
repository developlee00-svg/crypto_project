version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # 프로젝트 MySQL 연결 정보 (Airflow DAG에서 사용)
    CRYPTO_MYSQL_HOST: mysql
    CRYPTO_MYSQL_PORT: "3306"
    CRYPTO_MYSQL_USER: crypto
    CRYPTO_MYSQL_PASSWORD: crypto1234
    CRYPTO_MYSQL_DB: crypto_arbitrage
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  # ============================================================
  # Kafka (KRaft 모드 — Zookeeper 없이 자체 메타데이터 관리)
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # KRaft 모드 설정
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 리스너 설정
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # 클러스터 설정
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
        echo '토픽 생성 시작...'
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic crypto-prices-binance  --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic crypto-prices-upbit    --partitions 3 --replication-factor 1
        kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic crypto-prices-bithumb  --partitions 3 --replication-factor 1
        echo '토픽 생성 완료!'
        kafka-topics --list --bootstrap-server kafka:29092
      "

  # ============================================================
  # MySQL (프로젝트 데이터 저장)
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: crypto_arbitrage
      MYSQL_USER: crypto
      MYSQL_PASSWORD: crypto1234
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Airflow (PostgreSQL 메타 DB + Webserver + Scheduler)
  # ============================================================
  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: airflow scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  # ============================================================
  # WebSocket Producers (거래소별 시세 수집 → Kafka)
  # ============================================================
  producer-binance:
    build: ./producers
    container_name: producer-binance
    command: ["python", "-u", "producer_binance.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: always

  producer-upbit:
    build: ./producers
    container_name: producer-upbit
    command: ["python", "-u", "producer_upbit.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: always

  producer-bithumb:
    build: ./producers
    container_name: producer-bithumb
    command: ["python", "-u", "producer_bithumb.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    restart: always

  # ============================================================
  # Kafka → Kinesis 브릿지 Consumer
  # ============================================================
  kafka-kinesis-bridge:
    build: ./kafka-kinesis-bridge
    container_name: kafka-kinesis-bridge
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KINESIS_STREAM_NAME: crypto-stream-input
      AWS_REGION: ap-northeast-2
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      kafka:
        condition: service_healthy
    restart: always

volumes:
  mysql-data:
  airflow-pg-data: